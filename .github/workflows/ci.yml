name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Build-time placeholders — no real DB connection happens during build.
      AUTH_SECRET: ci-placeholder-secret-not-used-in-prod
      DATABASE_URL: postgresql://user:pass@localhost:5432/wisecard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
